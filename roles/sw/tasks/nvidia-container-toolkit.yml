- fail:
    msg: This playbook is merely UNTESTED, so define UNTESTED if you want to run it
  when:
    - UNTESTED is not defined

- name: docker?
  ansible.builtin.command: docker --version
  register: docker_installed
  no_log: true
  changed_when: false
  ignore_errors: yes

- name: add repo gpg key
  ansible.builtin.get_url:
    mode: 0644
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /usr/share/keyrings/nvidia-container-toolkit-keyring.asc

- name: remove old repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.asc] https://nvidia.github.io/libnvidia-container/stable/deb/amd64 /"
    state: absent

- name: add repo
  ansible.builtin.apt_repository:
    mode: 0644
    update_cache: false
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.asc] https://nvidia.github.io/libnvidia-container/stable/deb/amd64 /"
    filename: nvidia-container-toolkit
  register: repo

- name: update repo
  ansible.builtin.command: apt-get update -o Dir::Etc::sourcelist="sources.list.d/nvidia-container-toolkit.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
  when: repo.changed

- name: install
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: "{{ cache_valid_time | default(86400) }}"
    pkg:
      - nvidia-container-toolkit
  register: i

- name: configure
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  when: i.changed and docker_installed.rc == 0
  register: c

- name: restart docker
  ansible.builtin.systemd:
    state: restarted
    name: "docker"
  when: c.changed

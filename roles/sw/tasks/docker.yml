- fail:
    msg: This playbook is merely UNTESTED, so define UNTESTED if you want to run it
  when:
    - UNTESTED is not defined

- name: add repo gpg key
  ansible.builtin.get_url:
    mode: 0644
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc

- name: add repo
  ansible.builtin.apt_repository:
    mode: 0644
    update_cache: false
    register: repo
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
    filename: docker
  register: repo

- name: update repo
  ansible.builtin.command: apt-get update -o Dir::Etc::sourcelist="sources.list.d/docker.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
  when: repo.changed

- name: install
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: "{{ cache_valid_time | default(86400) }}"
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
  register: i

- name: Create file from template if it doesn't exist already.
  copy:
    content: '{}'
    dest: /etc/docker/daemon.json
    force: false

- name: load daemon.json
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: imported_json
  ignore_errors: true

- name: modify individual key-value
  set_fact:
    imported_json: "{{ imported_json.content|default('{}')|b64decode|from_json | combine(item, recursive=True)}}"
  loop:
    - { 'settings': { 'userns-remap': 'default' }}

- name: write updated daemon.json to file
  copy:
    content: "{{ imported_json | to_nice_json }}"
    dest: /etc/docker/daemon.json
  register: c

- name: restart
  ansible.builtin.systemd:
    state: restarted
    name: docker
  when: c.changed

- name: Create admins list
  include_tasks: _nested_user_list.yml
  vars:
    u: "{{ item_users }}"
  with_items: "{{ admins }}"
  loop_control:
    loop_var: item_users

- set_fact:
    u: "{{ u | flatten | map(attribute='name') | unique }}"

- name: ansible_user check
  ansible.builtin.fail:
    msg: "ansible_user must be root or included in admins, ansible_user:{{ ansible_user }}, admins: {{ u | join(', ')}}"
  when:
    - ansible_user != "root"
    - u is not contains(ansible_user)

- name: Check sudo root
  become: true
  ansible.builtin.command: whoami
  changed_when: false
